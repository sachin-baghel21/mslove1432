<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
  <body class="w-full">
    <h1 class="md:text-3xl sm:text-2xl font-bold text-red-400 py-2 px-2 sticky top-0">
      Duddu Details😘
    </h1>
<div class="bg-green-500  mx-auto py-4">
<form id="personalForm" class="max-w-2xl mx-auto bg-gradient-to-r from-pink-50 to-purple-100 shadow-xl rounded-lg p-8">
  <!-- Header -->
  <h2 class="text-3xl font-extrabold text-center text-purple-700 mb-8">
    Personal Details Form
  </h2>

  <!-- Love Name -->
  <div class="mb-5">
    <label for="loveName" class="block text-sm font-semibold text-gray-700 mb-2">Your Love Name</label>
    <input
      id="loveName"
      type="text"
      placeholder="Enter your partner's name"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
      required
    />
  </div>

  <!-- Birthday -->
  <div class="mb-5">
    <label for="birthday" class="block text-sm font-semibold text-gray-700 mb-2">Birthday Date</label>
    <input
      id="birthday"
      type="date"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
      required
    />
  </div>

  <!-- Favorite Color -->
  <div class="mb-5">
    <label for="favColor" class="block text-sm font-semibold text-gray-700 mb-2">Favorite Color</label>
    <input
      id="favColor"
      type="text"
      placeholder="Fav Color"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
  </div>

  <!-- Hobbies -->
  <div class="mb-5">
    <label for="hobbies" class="block text-sm font-semibold text-gray-700 mb-2">Nick Names</label>
    <input
      id="Nickname"
      type="text"
      placeholder="List your Nick names"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
  </div>

  <!-- Bad Habits -->
  <div class="mb-5">
    <label for="badHabits" class="block text-sm font-semibold text-gray-700 mb-2">Bad Habits</label>
    <input
      id="badHabits"
      type="text"
      placeholder="Mention your bad habits"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
  </div>

  <!-- Skills -->
  <div class="mb-5">
    <label for="skills" class="block text-sm font-semibold text-gray-700 mb-2">Hobbies</label>
    <textarea
      id="hobbies"
      rows="3"
      placeholder="Describe your Love Hobbies"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    ></textarea>
  </div>

  <!-- His/Her Look -->
  <div class="mb-5">
    <label for="look" class="block text-sm font-semibold text-gray-700 mb-2">His/Her Look</label>
    <select
      id="look"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    >
      <option value="">-- Select --</option>
      <option value="handsome">Handsome💕</option>
      <option value="beautiful">Beautiful🥰</option>
      <option value="cute">Cute😘</option>
      <option value="smart">Smart😎</option>
      <option value="charming">Charming😉</option>
    </select>
  </div>

  <!-- Couple Questions -->
  <div class="mb-5">
    <label for="firstMeet" class="block text-sm font-semibold text-gray-700 mb-2">When did you first meet?</label>
    <input
      id="firstMeet"
      type="text"
      placeholder="Describe your first meeting"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    />
  </div>

  <div class="mb-5">
    <label for="favMoment" class="block text-sm font-semibold text-gray-700 mb-2">Favorite Moment Together</label>
    <textarea
      id="favMoment"
      rows="3"
      placeholder="Share your favorite memory"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    ></textarea>
  </div>

  <div class="mb-5">
    <label for="futurePlans" class="block text-sm font-semibold text-gray-700 mb-2">Travel Together</label>
    <textarea
      id="futurePlaces"
      rows="3"
      placeholder="Write about your future places"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
    ></textarea>
  </div>

  <!-- Submit Button -->
  <div class="text-center">
    <button onclick="mysubmit()"
      type="submit"
      class="w-full md:w-auto bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out"
    >
      Submit Details
    </button>
  </div>
</form>
<footer><h3 class="text-center text-xl text-black">Our Relationship 2025-26</h3></footer>
</div>



    <script>
    //  // alert("Welcome To my Heart❤️👍");
    //     function mysubmit(){
    //         alert("Meri Bandriya 😁 uhmmm💋💋");
    //     }
     
    document.getElementById("personalForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        loveName: document.getElementById("loveName").value,
        birthday: document.getElementById("birthday").value,
        favColor: document.getElementById("favColor").value,
        Nickname: document.getElementById("Nickname").value,
        badHabits: document.getElementById("badHabits").value,
        hobbies: document.getElementById("hobbies").value,
        look: document.getElementById("look").value,
        firstMeet: document.getElementById("firstMeet").value,
        futurePlaces: document.getElementById("futurePlaces").value,
        favMoment: document.getElementById("favMoment").value
      };

      localStorage.setItem("personalFormData", JSON.stringify(data));
      window.location.href = "display.html";
      alert("Meri Mansi Bandariya..😁😎");
    });
    </script>
  </body>
</html>
