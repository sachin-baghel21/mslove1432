<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submitted Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-50 to-pink-100 min-h-screen flex items-center justify-center">

  <div class="max-w-3xl w-full bg-white shadow-lg rounded-lg p-8">
    <h2 class="text-2xl font-bold text-center text-purple-700 mb-6">Submitted Personal Details</h2>

    <table class="table-auto w-full border-collapse border border-gray-300">
      <thead>
        <tr class="bg-purple-100">
          <th class="border px-4 py-2 text-left">Field</th>
          <th class="border px-4 py-2 text-left">Value</th>
        </tr>
      </thead>
      <tbody id="dataTable"></tbody>
    </table>

    <div class="text-center mt-6">
      <a href="main-form.html" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg shadow-md">
        Back to Form
      </a>
    </div>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem("personalFormData"));
    if (data) {
      const table = document.getElementById("dataTable");
      Object.entries(data).forEach(([key, value]) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="border px-4 py-2 font-semibold capitalize">${key}</td>
          <td class="border px-4 py-2">${value}</td>
        `;
        table.appendChild(row);
      });
    }
  </script>
</body>
</html>
