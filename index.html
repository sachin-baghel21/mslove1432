<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
  <body class="w-full">
    <h1 class="md:text-3xl sm:text-2xl font-bold text-red-400 py-2 px-2 sticky top-0">
      Welcome Lali😘
    </h1>
<div class="bg-green-500  mx-auto py-4">
<form class="max-w-xl mx-auto bg-gradient-to-r from-blue-50 to-indigo-100 shadow-lg rounded-lg p-8">
  <!-- Header -->
  <h2 class="text-3xl font-extrabold text-center text-indigo-700 mb-8">
    College Registration
  </h2>

  <!-- Full Name -->
  <div class="mb-5">
    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
    <input
      id="name"
      type="text"
      placeholder="Enter your full name"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    />
  </div>

  <!-- Email -->
  <div class="mb-5">
    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
    <input
      id="email"
      type="email"
      placeholder="Enter your email"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    />
  </div>

  <!-- Phone -->
  <div class="mb-5">
    <label for="phone" class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
    <input
      id="phone"
      type="tel"
      placeholder="Enter your phone number"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    />
  </div>

  <!-- Gender -->
  <div class="mb-5">
    <label class="block text-sm font-semibold text-gray-700 mb-2">Gender</label>
    <div class="flex flex-wrap gap-4">
      <label class="inline-flex items-center">
        <input type="radio" name="gender" value="male" class="text-indigo-500 focus:ring-indigo-500" />
        <span class="ml-2">Male</span>
      </label>
      <label class="inline-flex items-center">
        <input type="radio" name="gender" value="female" class="text-indigo-500 focus:ring-indigo-500" />
        <span class="ml-2">Female</span>
      </label>
      <label class="inline-flex items-center">
        <input type="radio" name="gender" value="other" class="text-indigo-500 focus:ring-indigo-500" />
        <span class="ml-2">Other</span>
      </label>
    </div>
  </div>

  <!-- Course Selection -->
  <div class="mb-5">
    <label for="course" class="block text-sm font-semibold text-gray-700 mb-2">Select Course</label>
    <select
      id="course"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    >
      <option value="">-- Choose a course --</option>
      <option value="bsc">B.Sc</option>
      <option value="ba">B.A</option>
      <option value="bcom">B.Com</option>
      <option value="btech">B.Tech</option>
    </select>
  </div>

  <!-- Address -->
  <div class="mb-5">
    <label for="address" class="block text-sm font-semibold text-gray-700 mb-2">Address</label>
    <textarea
      id="address"
      rows="3"
      placeholder="Enter your address"
      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
      required
    ></textarea>
  </div>

  <!-- Submit Button -->
  <div class="text-center">
    <button onclick="myfun()"
      type="submit"
      class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out"
    >
      Next Steps<i class="fa-solid fa-arrow-right px-2"></i>
    </button>
  </div>
</form>

</div>



    <script>
        alert("Welcome To my Heart❤️👍");
            window.location.href = "main-form.html";
             function myfun() {
    // Collect all required fields
    const loveName = document.getElementById("loveName").value.trim();
    const birthday = document.getElementById("birthday").value.trim();
    const favColor = document.getElementById("favColor").value.trim();
    const nickNames = document.getElementById("nickNames") ? document.getElementById("nickNames").value.trim() : "";
    const badHabits = document.getElementById("badHabits").value.trim();

    // Check if any required field is empty
    if (!loveName || !birthday || !favColor || !badHabits) {
      alert("Please fill all required fields before moving to the next page ❤️");
      return;
    }

    // Save data to localStorage
    const data = {
      loveName,
      birthday,
      favColor,
      nickNames,
      badHabits
    };
    localStorage.setItem("personalFormData", JSON.stringify(data));

    // Redirect only if all fields are filled
    alert("Welcome To my Heart ❤️👍");
    window.location.href = "main-form.html";
  }
    </script>
  </body>
</html>
