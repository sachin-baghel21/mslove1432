<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-sm">
    <!-- Passport Size DP -->
    <div class="flex justify-center mb-6">
      <img src="couple.webp" alt="Profile" 
           class="w-24 h-24 rounded-full border-4 border-indigo-500 shadow-md">
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-semibold mb-1">User ID</label>
        <div class="flex items-center border rounded-lg px-3 py-2">
          <i class="fa-solid fa-user text-indigo-500 mr-2"></i>
          <input type="text" id="userid" placeholder="Enter User ID" 
                 class="w-full outline-none">
        </div>
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-1">Password</label>
        <div class="flex items-center border rounded-lg px-3 py-2">
          <i class="fa-solid fa-lock text-indigo-500 mr-2"></i>
          <input type="password" id="password" placeholder="Enter Password" 
                 class="w-full outline-none">
        </div>
      </div>

      <button type="submit" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg shadow-md transition duration-300 flex items-center justify-center">
        <i class="fa-solid fa-right-to-bracket mr-2"></i> Login
      </button>
    </form>
  </div>

  <!-- JavaScript Logic -->
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const userId = document.getElementById("userid").value;
      const password = document.getElementById("password").value;

      // Fixed credentials
      const fixedUser = "mslove1432";
      const fixedPass = "Love@1234";

      if (userId === fixedUser && password === fixedPass) {
        alert("Login Successfully!");
        window.location.href = "Registration.html"; // Redirect
      } else {
        alert("Invalid User ID or Password!");
      }
    });
  </script>
</body>
</html>
